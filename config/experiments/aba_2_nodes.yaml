experiment:
  name: "ABA_MultiAgent_Extraction"
  mlflow_run: "ABA_2_Nodes"
  architecture: "2_nodes"
  dataset_path: "artefatos/ner_datasets/obs_diarias_ner_abc_restaurado.csv"
  train_split_ratio: 0.8

domain:
  name: "ABA_Daily_Observations"
  tasks:
    - name: "extrair_comportamento"
      prompt_path: "artefatos/prompts/aba/extract_behavior.txt"
      entities: ["comportamento"]
    - name: "extrair_contexto_causal"
      prompt_path: "artefatos/prompts/aba/extract_antecedent_consequence.txt"
      entities: ["antecedente", "consequencia"]
  judge:
    prompt_path: "artefatos/prompts/aba/judge.txt"